<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Video — Đang khởi động...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
      user-select: none;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .logo span { color: #6366f1; }
    .status {
      font-size: 14px;
      color: #9ca3af;
      min-height: 20px;
      text-align: center;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #2d2d2d;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .warning {
      display: none;
      background: #1c1008;
      border: 1px solid #78350f;
      border-radius: 10px;
      padding: 16px 20px;
      max-width: 420px;
      text-align: center;
      font-size: 13px;
      color: #fbbf24;
      line-height: 1.6;
    }
    .warning.show { display: block; }
    .warning strong { display: block; margin-bottom: 6px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="logo">Content <span>Video</span></div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Đang khởi động backend...</div>

  <div class="warning" id="browserWarning">
    <strong>⚠ Anti-detect Browser chưa chạy</strong>
    Để sử dụng tính năng đăng YouTube, bạn cần mở ứng dụng quản lý profile
    (ví dụ: TaoThaoAI Claw) trước khi dùng app này.
    <br/><br/>App vẫn tiếp tục khởi động bình thường.
  </div>

  <script>
    const statusEl = document.getElementById('status')
    const warningEl = document.getElementById('browserWarning')

    if (window.electronAPI) {
      window.electronAPI.onBackendLog((msg) => {
        if (msg.includes('Application startup complete') || msg.includes('Uvicorn running')) {
          statusEl.textContent = 'Backend đã sẵn sàng, đang tải giao diện...'
        }
      })
      window.electronAPI.onBrowserApiStatus((available) => {
        if (!available) warningEl.classList.add('show')
      })
    }
  </script>
</body>
</html>
